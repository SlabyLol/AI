<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkFox AI | Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1115; color: #e5e7eb; }
        .glass-ui { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 border-b border-white/10 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-400">DarkFox <span class="text-white">AI</span></h1>
        <div id="status" class="text-xs text-gray-500 italic">Warte auf Eingabe...</div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col"></main>

    <footer class="p-4 bg-[#0f1115]">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="userInput" 
                class="flex-1 bg-[#1e293b] border border-white/10 rounded-xl py-3 px-4 focus:outline-none"
                placeholder="Schreib etwas...">
            <button onclick="handleSend()" class="bg-blue-600 px-4 py-2 rounded-xl font-bold">Senden</button>
        </div>
        <p class="text-[10px] text-center mt-2 text-gray-600">© 2026 DarkFox Co.</p>
    </footer>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        const chatBox = document.getElementById('chat-box');
        const statusLabel = document.getElementById('status');
        let generator = null;

        async function getGenerator() {
            if (generator) return generator;
            statusLabel.innerHTML = "Lade KI-Modell (ca. 50MB)...";
            // Wir nutzen ein extrem kleines Modell, das garantiert auf dem iPad läuft
            generator = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-78M');
            statusLabel.innerHTML = "KI Bereit";
            return generator;
        }

        window.handleSend = async () => {
            const text = document.getElementById('userInput').value;
            if (!text) return;

            appendMessage(text, 'user');
            document.getElementById('userInput').value = '';
            
            statusLabel.innerHTML = "KI denkt nach...";
            const gen = await getGenerator();
            const output = await gen(text, { max_new_tokens: 100, temperature: 0.7 });
            
            appendMessage(output[0].generated_text, 'ai');
            statusLabel.innerHTML = "Bereit";
        };

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = sender === 'user' 
                ? 'glass-ui p-3 rounded-xl max-w-[80%] self-end bg-blue-900/30' 
                : 'glass-ui p-3 rounded-xl max-w-[80%] self-start border-l-4 border-blue-500';
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
