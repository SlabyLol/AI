<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkFox AI | Cloud Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1115; color: #e5e7eb; }
        .glass-ui { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .typing { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col h-screen font-sans">

    <header class="p-4 border-b border-white/10 flex justify-between items-center bg-[#0f1115]">
        <h1 class="text-xl font-bold tracking-tighter text-blue-400">DARKFOX <span class="text-white">v3.5</span></h1>
        <div id="status" class="text-[10px] text-green-500 flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full"></span> SYSTEM ONLINE
        </div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col"></main>

    <footer class="p-4 bg-[#0f1115] border-t border-white/5">
        <div class="max-w-4xl mx-auto relative flex gap-2">
            <input type="text" id="userInput" 
                class="w-full bg-[#1e293b] border border-white/10 rounded-2xl py-4 px-6 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                placeholder="Frag mich etwas...">
            <button onclick="handleSend()" 
                class="bg-blue-600 hover:bg-blue-500 text-white px-6 rounded-2xl font-bold transition-all">
                SEND
            </button>
        </div>
        <p class="text-[9px] text-center mt-3 text-gray-600 tracking-widest uppercase">© 2026 DarkFox Co. | Encrypted Connection</p>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const inputField = document.getElementById('userInput');
        
        // DEIN KEY WURDE HIER INTEGRIERT
        const API_KEY = "ecb5f9e6f5194102ba261531353d06a4.xvf9QdTzvrpmawDJC6rX2jAQ"; 

        async function handleSend() {
            const text = inputField.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            inputField.value = '';

            const aiMsgDiv = appendMessage("Denke nach...", 'ai');
            aiMsgDiv.classList.add('typing');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: text }],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;

                aiMsgDiv.classList.remove('typing');
                aiMsgDiv.innerText = reply;

            } catch (e) {
                aiMsgDiv.innerText = "Verbindungsfehler. Überprüfe deinen Key oder das Guthaben.";
                aiMsgDiv.classList.remove('typing');
            }
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = sender === 'user' 
                ? 'glass-ui p-4 rounded-2xl max-w-[85%] self-end bg-blue-600/10 border-blue-500/30' 
                : 'glass-ui p-4 rounded-2xl max-w-[85%] self-start border-l-4 border-blue-500';
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
